name: CI/CD - Helios SYNC FRONTEND

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Login GHCR
        run: echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u edsoncandido --password-stdin
        
      - name: Build Docker image
        run: |
          docker build -t ghcr.io/edsoncandido/helios_sync_frontend:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push ghcr.io/edsoncandido/helios_sync_frontend:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            export IMAGE=ghcr.io/edsoncandido/helios_sync_frontend:${{ github.sha }}

            echo "Login GHCR"
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u edsoncandido --password-stdin

            echo "Pull nova imagem"
            docker pull $IMAGE

            echo "Rolling update (zero downtime)"
            docker compose -p helios-sync -f /root/traefik/sync/docker-compose.yml up -d --remove-orphans